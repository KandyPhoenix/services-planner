<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kandy's Planner">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Kandy's Planner</title>
<style>
  :root{
    --pink:#ff1c8d; --pink-dk:#c70063; --pink-soft:#ff5fab;
    --bg:#0c0c0f; --panel:#161619; --panel2:#1f1f24; --line:#2c2c34;
    --text:#f3f3f6; --muted:#9a9aa6;
    --red:#ff4d6d; --amber:#ffb020; --green:#37d39b; --blue:#4a9fff; --purple:#b06cff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.4;padding-bottom:96px}
  header{background:linear-gradient(160deg,#1b1b20,#0c0c0f);color:#fff;padding:16px 16px 14px;
    position:sticky;top:0;z-index:20;border-bottom:2px solid var(--pink);box-shadow:0 4px 20px rgba(0,0,0,.5)}
  header h1{margin:0;font-size:19px;display:flex;align-items:center;gap:7px}
  header h1 b{color:var(--pink)}
  .summary{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px 11px;font-size:10px;
    color:var(--muted);display:flex;flex-direction:column;min-width:58px;text-transform:uppercase;letter-spacing:.5px}
  .chip b{font-size:17px;line-height:1.1;color:var(--text);margin-bottom:1px}
  .chip.r b{color:var(--red)}.chip.a b{color:var(--amber)}.chip.g b{color:var(--green)}
  .wrap{max-width:1100px;margin:0 auto;padding:10px 6px 0}
  .monthbar{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 12px}
  .monthbar .mtitle{font-size:18px;font-weight:700}
  .nav{display:flex;align-items:center;gap:8px}
  .nav button{background:var(--panel);border:1px solid var(--line);color:var(--text);width:36px;height:36px;
    border-radius:10px;font-size:18px;cursor:pointer}
  .nav .today{width:auto;padding:0 12px;font-size:12px;font-weight:700;color:var(--pink)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px}
  .dow span{text-align:center;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cell{background:var(--panel);border:1px solid var(--line);border-radius:9px;min-height:154px;padding:6px 4px 5px;
    cursor:pointer;display:flex;flex-direction:column;gap:3px;overflow:hidden}
  .cell.out{opacity:.32}
  .cell.today{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink) inset}
  .cell.sel{background:var(--panel2);border-color:var(--pink-soft)}
  .cell .dn{font-size:12px;font-weight:700;color:var(--text)}
  .cell.today .dn{color:var(--pink)}
  .evs{display:flex;flex-direction:column;gap:2px;overflow:hidden}
  .ev{font-size:10px;line-height:1.2;font-weight:600;padding:3px 5px;border-radius:5px;color:#fff;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .ev.done{opacity:.4;text-decoration:line-through}
  .more{font-size:9px;color:var(--muted);font-weight:700;padding-left:2px}
  .dayp{margin:16px 0 4px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px}
  .dayp h3{margin:0 0 4px;font-size:14px;color:var(--text)}
  .dayp .none{color:var(--muted);font-size:13px;padding:6px 0}
  .row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .row:first-of-type{border-top:none}
  .check{flex:0 0 auto;width:22px;height:22px;border-radius:50%;border:2px solid #4a4a55;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
  .check.on{background:var(--green);border-color:var(--green)}
  .rtitle{flex:1;font-size:14px}
  .rtitle.done{text-decoration:line-through;color:var(--muted)}
  .tg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;color:#fff}
  .mini{border:none;background:none;color:#6a6a76;font-size:15px;cursor:pointer;padding:2px}
  .fab{position:fixed;right:16px;bottom:22px;background:var(--pink);color:#fff;border:none;width:56px;height:56px;
    border-radius:50%;font-size:30px;cursor:pointer;box-shadow:0 6px 22px rgba(255,28,141,.5);z-index:30}
  .barbtn{position:fixed;left:16px;bottom:26px;display:flex;gap:8px;z-index:25}
  .ghost{background:var(--panel);border:1px solid var(--line);color:var(--text);font-weight:700;border-radius:22px;
    padding:9px 14px;font-size:12.5px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.66);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .ov.show{display:flex}
  .sheet{background:var(--panel);width:100%;max-width:680px;border-radius:18px 18px 0 0;padding:18px 18px 28px;
    max-height:88vh;overflow:auto;border-top:2px solid var(--pink)}
  .sheet h2{margin:2px 0 12px;font-size:17px}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:11px 0 4px;text-transform:uppercase;letter-spacing:.5px}
  input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;
    font-family:inherit;background:var(--panel2);color:var(--text)}
  textarea{min-height:90px;resize:vertical}
  input::placeholder,textarea::placeholder{color:#5d5d68}
  .save{width:100%;background:var(--pink);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;
    font-weight:700;cursor:pointer;margin-top:16px}
  .rule{border:1px solid var(--line);border-radius:11px;padding:11px;margin:9px 0;background:var(--panel2)}
  .rule .rh{display:flex;align-items:center;gap:10px}
  .rule .cfg{display:flex;gap:8px;margin-top:9px}
  .rule .cfg>div{flex:1}
  .sw{position:relative;width:42px;height:24px;flex:0 0 auto}
  .sw input{opacity:0;width:0;height:0;position:absolute}
  .sl{position:absolute;inset:0;background:#3a3a44;border-radius:24px;cursor:pointer;transition:.15s}
  .sl:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .sw input:checked+.sl{background:var(--green)}.sw input:checked+.sl:before{transform:translateX(18px)}
  .hint{font-size:11.5px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>
<header>
  <h1>📋 Kandy's <b>Planner</b></h1>
  <div class="summary" id="summary"></div>
</header>

<div class="wrap">
  <div class="monthbar">
    <div class="mtitle" id="mtitle"></div>
    <div class="nav">
      <button onclick="shiftMonth(-1)">‹</button>
      <button class="today" onclick="goToday()">Today</button>
      <button onclick="shiftMonth(1)">›</button>
    </div>
  </div>
  <div class="dow"><span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span></div>
  <div class="cal" id="cal"></div>
  <div class="dayp" id="dayp"></div>
</div>

<button class="fab" onclick="openTask()">+</button>
<div class="barbtn"><button class="ghost" onclick="openRules()">⚙ Recurring</button><button class="ghost" onclick="openImport()">⤓ Import</button></div>

<div class="ov" id="taskOv"><div class="sheet">
  <h2 id="taskTitle">Add deliverable</h2>
  <label>What needs doing</label><input id="tTitle" placeholder="e.g. Publish blog post">
  <label>Client</label><input id="tClient" placeholder="Lori" list="clients"><datalist id="clients"></datalist>
  <label>Type</label><select id="tType"><option>Blog</option><option>Social</option><option>LinkedIn</option><option>SEO</option><option>Report</option><option>Other</option></select>
  <label>Due date</label><input id="tDue" type="date">
  <button class="save" onclick="saveTask()">Save</button>
  <button class="save" style="background:transparent;color:var(--red);border:1px solid var(--line);margin-top:8px;display:none" id="tDel" onclick="delTask()">Delete</button>
</div></div>

<div class="ov" id="ruleOv"><div class="sheet">
  <h2>⚙ Recurring deliverables</h2>
  <div class="hint" style="margin-bottom:6px">Auto-fill the calendar each week/month. Toggle off to pause.</div>
  <div id="ruleList"></div>
  <button class="save" onclick="closeOv('ruleOv')">Done</button>
</div></div>

<div class="ov" id="impOv"><div class="sheet">
  <h2>⤓ Import deliverables</h2>
  <div class="hint" style="margin-bottom:6px">Paste a setup code or link (from Kandy/Claude) to load deliverables in one tap.</div>
  <textarea id="impText" placeholder="Paste the code or link here…"></textarea>
  <button class="save" onclick="doImport()">Import</button>
</div></div>

<script>
var KEY='services_planner_v1';
var WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var TYPES=['Blog','Social','LinkedIn','SEO','Report','Other'];
function typeColor(t){return {Blog:'#37d39b',Social:'#ff1c8d',LinkedIn:'#4a9fff',SEO:'#ffb020',Report:'#b06cff',Other:'#9a9aa6'}[t]||'#9a9aa6';}
function todayMid(){var d=new Date();d.setHours(0,0,0,0);return d;}
function iso(d){var x=new Date(d);x.setHours(0,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
function parse(s){var p=s.split('-');var x=new Date(+p[0],+p[1]-1,+p[2]);x.setHours(0,0,0,0);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function esc(s){return (''+s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

var DEFAULT={rules:[],oneoffs:[],done:{}};
function load(){try{var r=JSON.parse(localStorage.getItem(KEY));if(r&&r.rules)return r;}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
var S=load();

function decodeSeed(raw){
  var m=(''+raw).match(/seed=([^&#\s]+)/); var b=m?m[1]:(''+raw).trim();
  b=decodeURIComponent(b).replace(/-/g,'+').replace(/_/g,'/').replace(/\s/g,'');
  while(b.length%4)b+='=';
  var bin=atob(b);
  var json=decodeURIComponent(Array.prototype.map.call(bin,function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));
  return JSON.parse(json);
}
function mergeData(d){
  (d.rules||[]).forEach(function(r){if(!S.rules.some(function(x){return x.id===r.id;}))S.rules.push(r);});
  (d.oneoffs||[]).forEach(function(o){if(!S.oneoffs.some(function(x){return x.id===o.id;}))S.oneoffs.push(o);});
  save();
}
// one-time import via link
(function(){try{var src=(location.search||'')+(location.hash||'');if(/seed=/.test(src)){mergeData(decodeSeed(src));history.replaceState(null,'',location.pathname);}}catch(e){}})();

var viewY,viewM,selDate;
(function(){var t=todayMid();viewY=t.getFullYear();viewM=t.getMonth();selDate=iso(t);})();

function instancesIn(start,end){
  var out=[];
  S.rules.forEach(function(r){
    if(!r.active)return;
    if(r.freq==='weekly'){var d=new Date(start);while(d.getDay()!==r.dow)d=addDays(d,1);while(d<=end){out.push(inst(r,d));d=addDays(d,7);}}
    else if(r.freq==='biweekly'){var d=parse(r.anchor||iso(start));while(d>start)d=addDays(d,-14);while(d<start)d=addDays(d,14);while(d<=end){out.push(inst(r,d));d=addDays(d,14);}}
    else if(r.freq==='monthly'){var cur=new Date(start.getFullYear(),start.getMonth(),1);while(cur<=end){var dm=new Date(cur.getFullYear(),cur.getMonth(),r.dom||24);dm.setHours(0,0,0,0);if(dm>=start&&dm<=end)out.push(inst(r,dm));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);}}
  });
  return out;
}
function inst(r,d){var key=r.id+'|'+iso(d);return{key:key,client:r.client,type:r.type,title:r.title,date:iso(d),done:!!S.done[key],recurring:true};}
function itemsIn(start,end){
  var items=instancesIn(start,end);
  S.oneoffs.forEach(function(o){var d=parse(o.due);if(d>=start&&d<=end)items.push({key:'one|'+o.id,id:o.id,client:o.client,type:o.type,title:o.title,date:o.due,done:!!o.done,recurring:false});});
  return items;
}

function render(){renderSummary();renderCal();renderDay();}

function renderSummary(){
  var start=todayMid();
  var all=itemsIn(addDays(start,-40),addDays(start,60)),open=all.filter(function(i){return !i.done;});
  var over=open.filter(function(i){return parse(i.date)<start;}).length;
  var tod=open.filter(function(i){return i.date===iso(start);}).length;
  var wk=open.filter(function(i){var d=parse(i.date);return d>start&&d<=addDays(start,7);}).length;
  var done=all.filter(function(i){return i.done;}).length;
  document.getElementById('summary').innerHTML=
    '<div class="chip r"><b>'+over+'</b>overdue</div><div class="chip a"><b>'+tod+'</b>today</div>'+
    '<div class="chip"><b>'+wk+'</b>next 7d</div><div class="chip g"><b>'+done+'</b>done</div>';
}

function renderCal(){
  var first=new Date(viewY,viewM,1);
  document.getElementById('mtitle').textContent=first.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var gridStart=addDays(first,-first.getDay()), gridEnd=addDays(gridStart,41);
  var items=itemsIn(gridStart,gridEnd), by={};
  items.forEach(function(i){(by[i.date]=by[i.date]||[]).push(i);});
  var tIso=iso(todayMid()), html='';
  for(var k=0;k<42;k++){
    var d=addDays(gridStart,k), di=iso(d), list=by[di]||[];
    var cls='cell';
    if(d.getMonth()!==viewM)cls+=' out';
    if(di===tIso)cls+=' today';
    if(di===selDate)cls+=' sel';
    var evs='';
    list.slice(0,4).forEach(function(i){evs+='<div class="ev '+(i.done?'done':'')+'" style="background:'+typeColor(i.type)+'">'+esc(i.title)+'</div>';});
    if(list.length>4)evs+='<span class="more">+'+(list.length-4)+'</span>';
    html+='<div class="'+cls+'" onclick="selectDay(\''+di+'\')"><span class="dn">'+d.getDate()+'</span><div class="evs">'+evs+'</div></div>';
  }
  document.getElementById('cal').innerHTML=html;
}

function renderDay(){
  var d=parse(selDate), start=todayMid();
  var list=itemsIn(d,d).sort(function(a,b){return a.done-b.done;});
  var head='<h3>'+d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})+'</h3>';
  if(!list.length){document.getElementById('dayp').innerHTML=head+'<div class="none">Nothing due. Tap <b style="color:var(--pink)">+</b> to add.</div>';return;}
  var rows=list.map(function(i){
    var editb=i.recurring?'':'<button class="mini" onclick="event.stopPropagation();openTask(\''+i.id+'\')">✏️</button>';
    return '<div class="row"><div class="check '+(i.done?'on':'')+'" onclick="toggle(\''+i.key+'\')">'+(i.done?'✓':'')+'</div>'+
      '<div class="rtitle '+(i.done?'done':'')+'">'+esc(i.title)+'</div>'+
      '<span class="tg" style="background:'+typeColor(i.type)+'">'+esc(i.type)+'</span>'+editb+'</div>';
  }).join('');
  document.getElementById('dayp').innerHTML=head+rows;
}

function selectDay(di){selDate=di;renderCal();renderDay();}
function shiftMonth(n){viewM+=n;if(viewM<0){viewM=11;viewY--;}if(viewM>11){viewM=0;viewY++;}renderCal();}
function goToday(){var t=todayMid();viewY=t.getFullYear();viewM=t.getMonth();selDate=iso(t);render();}

function toggle(key){
  if(key.indexOf('one|')===0){var id=key.slice(4);var o=S.oneoffs.filter(function(x){return x.id==id;})[0];if(o)o.done=!o.done;}
  else S.done[key]=!S.done[key];
  save();render();
}

var editId=null;
function openTask(id){
  editId=id||null;
  document.getElementById('taskTitle').textContent=id?'Edit deliverable':'Add deliverable';
  document.getElementById('tDel').style.display=id?'block':'none';
  var clients=[];itemsIn(addDays(todayMid(),-60),addDays(todayMid(),120)).forEach(function(i){if(clients.indexOf(i.client)<0)clients.push(i.client);});
  document.getElementById('clients').innerHTML=clients.map(function(c){return '<option value="'+esc(c)+'">';}).join('');
  var o=id?S.oneoffs.filter(function(x){return x.id==id;})[0]:null;
  document.getElementById('tTitle').value=o?o.title:'';
  document.getElementById('tClient').value=o?o.client:'Lori';
  document.getElementById('tType').value=o?o.type:'Other';
  document.getElementById('tDue').value=o?o.due:selDate;
  document.getElementById('taskOv').classList.add('show');
}
function saveTask(){
  var t=document.getElementById('tTitle').value.trim();if(!t){alert('Add a title');return;}
  var data={title:t,client:document.getElementById('tClient').value.trim()||'Lori',type:document.getElementById('tType').value,due:document.getElementById('tDue').value};
  if(editId)Object.assign(S.oneoffs.filter(function(x){return x.id==editId;})[0],data);
  else{data.id='o'+Date.now();data.done=false;S.oneoffs.push(data);}
  save();closeOv('taskOv');selDate=data.due;render();
}
function delTask(){if(editId&&confirm('Delete this deliverable?')){S.oneoffs=S.oneoffs.filter(function(x){return x.id!=editId;});save();closeOv('taskOv');render();}}

function openRules(){renderRules();document.getElementById('ruleOv').classList.add('show');}
function renderRules(){
  document.getElementById('ruleList').innerHTML=S.rules.map(function(r,idx){
    var cfg=(r.freq==='weekly'||r.freq==='biweekly')
      ? '<div><label>Day</label><select onchange="setRule('+idx+',\'dow\',this.value)">'+WD.map(function(w,wi){return '<option value="'+wi+'" '+(r.dow==wi?'selected':'')+'>'+w+'</option>';}).join('')+'</select></div>'
      : '<div><label>Day of month</label><input type="number" min="1" max="28" value="'+(r.dom||24)+'" onchange="setRule('+idx+',\'dom\',this.value)"></div>';
    var freq='<div><label>Repeat</label><select onchange="setRule('+idx+',\'freq\',this.value)">'+['weekly','biweekly','monthly'].map(function(f){return '<option '+(r.freq===f?'selected':'')+'>'+f+'</option>';}).join('')+'</select></div>';
    var type='<div><label>Type</label><select onchange="setRule('+idx+',\'type\',this.value)">'+TYPES.map(function(t){return '<option '+(r.type===t?'selected':'')+'>'+t+'</option>';}).join('')+'</select></div>';
    return '<div class="rule"><div class="rh">'+
      '<input style="flex:1;font-weight:700;font-size:13px;padding:7px" value="'+esc(r.client)+'" placeholder="Client" onchange="setRule('+idx+',\'client\',this.value)">'+
      '<label class="sw"><input type="checkbox" '+(r.active?'checked':'')+' onchange="setRule('+idx+',\'active\',this.checked)"><span class="sl"></span></label>'+
      '<button class="mini" onclick="delRule('+idx+')">🗑️</button></div>'+
      '<input style="margin-top:6px;font-size:13px;padding:8px" value="'+esc(r.title)+'" placeholder="What needs doing" onchange="setRule('+idx+',\'title\',this.value)">'+
      '<div class="cfg">'+type+freq+cfg+'</div></div>';
  }).join('')+'<button class="ghost" style="position:static;width:100%;margin-top:8px" onclick="addRule()">+ Add recurring deliverable</button>';
}
function addRule(){S.rules.push({id:'r'+Date.now(),client:'Lori',type:'Social',title:'New deliverable',freq:'weekly',dow:1,active:true});save();renderRules();render();}
function delRule(idx){if(confirm('Delete this recurring deliverable?')){S.rules.splice(idx,1);save();renderRules();render();}}
function setRule(idx,k,v){
  if(k==='active')S.rules[idx][k]=v;else if(k==='dow'||k==='dom')S.rules[idx][k]=+v;else S.rules[idx][k]=v;
  if(k==='freq'&&v==='monthly'&&!S.rules[idx].dom)S.rules[idx].dom=24;
  if(k==='freq'&&(v==='weekly'||v==='biweekly')){if(S.rules[idx].dow==null)S.rules[idx].dow=1;if(v==='biweekly'&&!S.rules[idx].anchor)S.rules[idx].anchor=iso(todayMid());}
  save();render();if(k==='freq'||k==='type')renderRules();
}

function openImport(){document.getElementById('impText').value='';document.getElementById('impOv').classList.add('show');}
function doImport(){
  try{mergeData(decodeSeed(document.getElementById('impText').value));closeOv('impOv');render();alert('Imported!');}
  catch(e){alert('That code did not work — paste the full code or link.');}
}

function closeOv(id){document.getElementById(id).classList.remove('show');}
[].forEach.call(document.querySelectorAll('.ov'),function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('show');});});

render();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
