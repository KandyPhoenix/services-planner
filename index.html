<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Services Planner">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Paid Services Planner</title>
<style>
  :root{
    --pink:#ff1c8d; --pink-dk:#c70063; --pink-soft:#ff5fab;
    --bg:#0c0c0f; --panel:#161619; --panel2:#1f1f24; --line:#2c2c34;
    --text:#f3f3f6; --muted:#9a9aa6;
    --red:#ff4d6d; --amber:#ffb020; --green:#37d39b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.45;padding-bottom:96px}
  header{background:linear-gradient(160deg,#1b1b20,#0c0c0f);color:#fff;padding:18px 18px 16px;
    position:sticky;top:0;z-index:20;border-bottom:2px solid var(--pink);box-shadow:0 4px 20px rgba(0,0,0,.5)}
  header h1{margin:0;font-size:20px;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
  header h1 b{color:var(--pink)}
  header .sub{margin:3px 0 0;font-size:12.5px;color:var(--muted)}
  .summary{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:7px 12px;font-size:11px;
    color:var(--muted);display:flex;flex-direction:column;min-width:64px;text-transform:uppercase;letter-spacing:.5px}
  .chip b{font-size:18px;line-height:1.1;color:var(--text);margin-bottom:1px}
  .chip.r b{color:var(--red)}.chip.a b{color:var(--amber)}.chip.g b{color:var(--green)}
  .wrap{max-width:760px;margin:0 auto;padding:14px 14px 0}
  .filters{display:flex;gap:7px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
  .fbtn{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:20px;
    padding:6px 14px;font-size:12.5px;cursor:pointer;font-weight:600}
  .fbtn.on{background:var(--pink);color:#fff;border-color:var(--pink)}
  .bucket{margin:18px 0 4px;font-size:11.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
    color:var(--muted);display:flex;align-items:center;gap:8px}
  .bucket .ln{flex:1;height:1px;background:var(--line)}
  .card{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--pink);border-radius:13px;
    padding:12px 13px;margin:9px 0;display:flex;align-items:flex-start;gap:11px}
  .card.over{border-left-color:var(--red)}.card.today{border-left-color:var(--amber)}
  .card.done{opacity:.5}
  .check{flex:0 0 auto;width:23px;height:23px;border-radius:50%;border:2px solid #4a4a55;cursor:pointer;
    margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.12s}
  .check.on{background:var(--green);border-color:var(--green)}
  .body{flex:1;min-width:0}
  .title{font-weight:600;font-size:15px;color:var(--text)}
  .title.done{text-decoration:line-through;color:var(--muted)}
  .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:6px;align-items:center}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:7px;background:var(--panel2);color:#b9b9c4}
  .tag.client{background:var(--pink);color:#fff}
  .due{font-size:12px;color:var(--muted)}
  .count{font-size:11.5px;font-weight:800;padding:2px 9px;border-radius:7px;background:rgba(255,28,141,.16);color:var(--pink-soft)}
  .count.over{background:rgba(255,77,109,.18);color:var(--red)}.count.today,.count.soon{background:rgba(255,176,32,.16);color:var(--amber)}
  .mini{border:none;background:none;color:#6a6a76;font-size:15px;cursor:pointer;padding:2px}
  .empty{text-align:center;color:var(--muted);padding:40px 10px;font-size:14px;line-height:1.7}
  .fab{position:fixed;right:18px;bottom:22px;background:var(--pink);color:#fff;border:none;width:58px;height:58px;
    border-radius:50%;font-size:30px;cursor:pointer;box-shadow:0 6px 22px rgba(255,28,141,.5);z-index:30}
  .barbtn{position:fixed;left:50%;transform:translateX(-50%);bottom:28px;z-index:25}
  .ghost{background:var(--panel);border:1px solid var(--line);color:var(--text);font-weight:700;border-radius:22px;
    padding:10px 17px;font-size:13px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.66);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .ov.show{display:flex}
  .sheet{background:var(--panel);width:100%;max-width:760px;border-radius:18px 18px 0 0;padding:18px 18px 28px;
    max-height:88vh;overflow:auto;border-top:2px solid var(--pink)}
  .sheet h2{margin:2px 0 14px;font-size:17px;color:var(--text)}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin:11px 0 4px;text-transform:uppercase;letter-spacing:.5px}
  input,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;
    font-family:inherit;background:var(--panel2);color:var(--text)}
  input::placeholder{color:#5d5d68}
  .save{width:100%;background:var(--pink);color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;
    font-weight:700;cursor:pointer;margin-top:18px}
  .rule{border:1px solid var(--line);border-radius:11px;padding:11px;margin:9px 0;background:var(--panel2)}
  .rule .rh{display:flex;align-items:center;gap:10px}
  .rule .cfg{display:flex;gap:8px;margin-top:9px}
  .rule .cfg>div{flex:1}
  .sw{position:relative;width:42px;height:24px;flex:0 0 auto}
  .sw input{opacity:0;width:0;height:0;position:absolute}
  .sl{position:absolute;inset:0;background:#3a3a44;border-radius:24px;cursor:pointer;transition:.15s}
  .sl:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .sw input:checked+.sl{background:var(--green)}.sw input:checked+.sl:before{transform:translateX(18px)}
  .hint{font-size:11.5px;color:var(--muted);margin-top:3px}
</style>
</head>
<body>
<header>
  <h1>📋 Paid Services <b>Planner</b></h1>
  <div class="sub">Client deliverables — what's due &amp; how long you've got</div>
  <div class="summary" id="summary"></div>
</header>

<div class="wrap">
  <div class="filters" id="filters"></div>
  <div id="list"></div>
</div>

<button class="fab" onclick="openTask()">+</button>
<div class="barbtn"><button class="ghost" onclick="openRules()">⚙ Recurring</button></div>

<div class="ov" id="taskOv">
  <div class="sheet">
    <h2 id="taskTitle">Add deliverable</h2>
    <label>What needs doing</label>
    <input id="tTitle" placeholder="e.g. Publish blog post">
    <label>Client</label>
    <input id="tClient" placeholder="Lori" list="clients">
    <datalist id="clients"></datalist>
    <label>Type</label>
    <select id="tType"><option>Blog</option><option>Social</option><option>LinkedIn</option><option>SEO</option><option>Report</option><option>Other</option></select>
    <label>Due date</label>
    <input id="tDue" type="date">
    <button class="save" onclick="saveTask()">Save</button>
    <button class="save" style="background:transparent;color:var(--red);border:1px solid var(--line);margin-top:8px;display:none" id="tDel" onclick="delTask()">Delete</button>
  </div>
</div>

<div class="ov" id="ruleOv">
  <div class="sheet">
    <h2>⚙ Recurring deliverables</h2>
    <div class="hint" style="margin-bottom:6px">These auto-fill your planner each week/month. Toggle off to pause one.</div>
    <div id="ruleList"></div>
    <button class="save" onclick="closeOv('ruleOv')">Done</button>
  </div>
</div>

<script>
var KEY='services_planner_v1';
var WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var TYPES=['Blog','Social','LinkedIn','SEO','Report','Other'];
function todayMid(){var d=new Date();d.setHours(0,0,0,0);return d;}
function iso(d){var x=new Date(d);x.setHours(0,0,0,0);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
function parse(s){var p=s.split('-');var x=new Date(+p[0],+p[1]-1,+p[2]);x.setHours(0,0,0,0);return x;}
function addDays(d,n){var x=new Date(d);x.setDate(x.getDate()+n);return x;}
function esc(s){return (''+s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

var DEFAULT={rules:[],oneoffs:[],done:{}};
function load(){try{var r=JSON.parse(localStorage.getItem(KEY));if(r&&r.rules)return r;}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
var S=load();

// Private one-time import via #seed=  (data lives in the link, never in the published code)
(function(){
  try{
    var h=location.hash||'';var i=h.indexOf('seed=');
    if(i>-1){
      var b=h.substring(i+5).replace(/ /g,'+');
      var bin=atob(b);
      var json=decodeURIComponent(Array.prototype.map.call(bin,function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));
      var d=JSON.parse(json);
      (d.rules||[]).forEach(function(r){if(!S.rules.some(function(x){return x.id===r.id;}))S.rules.push(r);});
      (d.oneoffs||[]).forEach(function(o){if(!S.oneoffs.some(function(x){return x.id===o.id;}))S.oneoffs.push(o);});
      save();history.replaceState(null,'',location.pathname);
    }
  }catch(e){}
})();

var filter='All';

function genInstances(){
  var start=todayMid(),end=addDays(start,70),out=[];
  S.rules.forEach(function(r){
    if(!r.active)return;
    if(r.freq==='weekly'){var d=new Date(start);while(d<=end){if(d.getDay()===r.dow)out.push(inst(r,d));d=addDays(d,1);}}
    else if(r.freq==='biweekly'){var d2=parse(r.anchor||iso(start));while(d2<start)d2=addDays(d2,14);while(d2<=end){out.push(inst(r,d2));d2=addDays(d2,14);}}
    else if(r.freq==='monthly'){var y=start.getFullYear(),m=start.getMonth();for(var k=0;k<3;k++){var dm=new Date(y,m+k,r.dom||24);dm.setHours(0,0,0,0);if(dm>=start&&dm<=end)out.push(inst(r,dm));}}
  });
  return out;
}
function inst(r,d){var key=r.id+'|'+iso(d);return{key:key,client:r.client,type:r.type,title:r.title,date:iso(d),done:!!S.done[key],recurring:true};}
function allItems(){
  var items=genInstances();
  S.oneoffs.forEach(function(o){items.push({key:'one|'+o.id,id:o.id,client:o.client,type:o.type,title:o.title,date:o.due,done:!!o.done,recurring:false});});
  return items;
}

function render(){
  var items=allItems().filter(function(i){return filter==='All'||i.client===filter;});
  var start=todayMid();
  var all=allItems(),open=all.filter(function(i){return !i.done;});
  var over=open.filter(function(i){return parse(i.date)<start;}).length;
  var tod=open.filter(function(i){return iso(parse(i.date))===iso(start);}).length;
  var wk=open.filter(function(i){var d=parse(i.date);return d>start&&d<=addDays(start,7);}).length;
  document.getElementById('summary').innerHTML=
    '<div class="chip r"><b>'+over+'</b>overdue</div><div class="chip a"><b>'+tod+'</b>today</div>'+
    '<div class="chip"><b>'+wk+'</b>next 7d</div><div class="chip g"><b>'+all.filter(function(i){return i.done;}).length+'</b>done</div>';
  var clients=[];allItems().forEach(function(i){if(clients.indexOf(i.client)<0)clients.push(i.client);});
  document.getElementById('clients').innerHTML=clients.map(function(c){return '<option value="'+esc(c)+'">';}).join('');
  document.getElementById('filters').innerHTML=['All'].concat(clients).map(function(c){
    return '<button class="fbtn '+(filter===c?'on':'')+'" onclick="filter=\''+esc(c)+'\';render()">'+esc(c)+'</button>';}).join('');
  var open2=items.filter(function(i){return !i.done;}).sort(function(a,b){return a.date<b.date?-1:1;});
  var done=items.filter(function(i){return i.done;}).sort(function(a,b){return a.date<b.date?1:-1;}).slice(0,12);
  var order=['⚠️ Overdue','📌 Today','🗓️ Next 7 Days','⏳ Upcoming'],buckets={};order.forEach(function(b){buckets[b]=[];});
  open2.forEach(function(i){var d=parse(i.date);
    if(d<start)buckets['⚠️ Overdue'].push(i);
    else if(iso(d)===iso(start))buckets['📌 Today'].push(i);
    else if(d<=addDays(start,7))buckets['🗓️ Next 7 Days'].push(i);
    else buckets['⏳ Upcoming'].push(i);});
  var html='';
  order.forEach(function(b){if(buckets[b].length)html+='<div class="bucket">'+b+'<span class="ln"></span></div>'+buckets[b].map(cardHTML).join('');});
  if(done.length)html+='<div class="bucket">✅ Recently done<span class="ln"></span></div>'+done.map(cardHTML).join('');
  if(!open2.length&&!done.length)html='<div class="empty">No deliverables yet.<br>Tap <b style="color:var(--pink)">+</b> to add one, or <b>⚙ Recurring</b> to set up repeating posts.</div>';
  document.getElementById('list').innerHTML=html;
}

function cardHTML(i){
  var start=todayMid(),d=parse(i.date),diff=Math.round((d-start)/86400000),cnt,cc='';
  if(i.done)cnt='done';
  else if(diff<0){cnt='overdue '+(-diff)+'d';cc='over';}
  else if(diff===0){cnt='due today';cc='today';}
  else if(diff<=3){cnt='in '+diff+'d';cc='soon';}
  else cnt='in '+diff+'d';
  var cls=i.done?'done':(diff<0?'over':(diff===0?'today':''));
  var dlabel=d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  var editb=i.recurring?'':'<button class="mini" onclick="openTask(\''+i.id+'\')">✏️</button>';
  return '<div class="card '+cls+'">'+
    '<div class="check '+(i.done?'on':'')+'" onclick="toggle(\''+i.key+'\')">'+(i.done?'✓':'')+'</div>'+
    '<div class="body"><div class="title '+(i.done?'done':'')+'">'+esc(i.title)+'</div>'+
    '<div class="meta"><span class="tag client">'+esc(i.client)+'</span><span class="tag">'+esc(i.type)+'</span>'+
    '<span class="due">'+dlabel+'</span>'+(i.done?'':'<span class="count '+cc+'">'+cnt+'</span>')+editb+'</div></div></div>';
}

function toggle(key){
  if(key.indexOf('one|')===0){var id=key.slice(4);var o=S.oneoffs.filter(function(x){return x.id==id;})[0];if(o)o.done=!o.done;}
  else S.done[key]=!S.done[key];
  save();render();
}

var editId=null;
function openTask(id){
  editId=id||null;
  document.getElementById('taskTitle').textContent=id?'Edit deliverable':'Add deliverable';
  document.getElementById('tDel').style.display=id?'block':'none';
  var o=id?S.oneoffs.filter(function(x){return x.id==id;})[0]:null;
  document.getElementById('tTitle').value=o?o.title:'';
  document.getElementById('tClient').value=o?o.client:(filter!=='All'?filter:'Lori');
  document.getElementById('tType').value=o?o.type:'Other';
  document.getElementById('tDue').value=o?o.due:iso(todayMid());
  document.getElementById('taskOv').classList.add('show');
}
function saveTask(){
  var t=document.getElementById('tTitle').value.trim();if(!t){alert('Add a title');return;}
  var data={title:t,client:document.getElementById('tClient').value.trim()||'Lori',type:document.getElementById('tType').value,due:document.getElementById('tDue').value};
  if(editId)Object.assign(S.oneoffs.filter(function(x){return x.id==editId;})[0],data);
  else{data.id='o'+Date.now();data.done=false;S.oneoffs.push(data);}
  save();closeOv('taskOv');render();
}
function delTask(){if(editId&&confirm('Delete this deliverable?')){S.oneoffs=S.oneoffs.filter(function(x){return x.id!=editId;});save();closeOv('taskOv');render();}}

function openRules(){renderRules();document.getElementById('ruleOv').classList.add('show');}
function renderRules(){
  document.getElementById('ruleList').innerHTML=S.rules.map(function(r,idx){
    var cfg=(r.freq==='weekly'||r.freq==='biweekly')
      ? '<div><label>Day</label><select onchange="setRule('+idx+',\'dow\',this.value)">'+WD.map(function(w,wi){return '<option value="'+wi+'" '+(r.dow==wi?'selected':'')+'>'+w+'</option>';}).join('')+'</select></div>'
      : '<div><label>Day of month</label><input type="number" min="1" max="28" value="'+(r.dom||24)+'" onchange="setRule('+idx+',\'dom\',this.value)"></div>';
    var freq='<div><label>Repeat</label><select onchange="setRule('+idx+',\'freq\',this.value)">'+['weekly','biweekly','monthly'].map(function(f){return '<option '+(r.freq===f?'selected':'')+'>'+f+'</option>';}).join('')+'</select></div>';
    var type='<div><label>Type</label><select onchange="setRule('+idx+',\'type\',this.value)">'+TYPES.map(function(t){return '<option '+(r.type===t?'selected':'')+'>'+t+'</option>';}).join('')+'</select></div>';
    return '<div class="rule"><div class="rh">'+
      '<input style="flex:1;font-weight:700;font-size:13px;padding:7px" value="'+esc(r.client)+'" placeholder="Client" onchange="setRule('+idx+',\'client\',this.value)">'+
      '<label class="sw"><input type="checkbox" '+(r.active?'checked':'')+' onchange="setRule('+idx+',\'active\',this.checked)"><span class="sl"></span></label>'+
      '<button class="mini" onclick="delRule('+idx+')">🗑️</button></div>'+
      '<input style="margin-top:6px;font-size:13px;padding:8px" value="'+esc(r.title)+'" placeholder="What needs doing" onchange="setRule('+idx+',\'title\',this.value)">'+
      '<div class="cfg">'+type+freq+cfg+'</div></div>';
  }).join('')+'<button class="ghost" style="position:static;transform:none;width:100%;margin-top:8px" onclick="addRule()">+ Add recurring deliverable</button>';
}
function addRule(){S.rules.push({id:'r'+Date.now(),client:(filter!=='All'?filter:'Lori'),type:'Social',title:'New deliverable',freq:'weekly',dow:1,active:true});save();renderRules();render();}
function delRule(idx){if(confirm('Delete this recurring deliverable?')){S.rules.splice(idx,1);save();renderRules();render();}}
function setRule(idx,k,v){
  if(k==='active')S.rules[idx][k]=v;
  else if(k==='dow'||k==='dom')S.rules[idx][k]=+v;
  else S.rules[idx][k]=v;
  if(k==='freq'&&v==='monthly'&&!S.rules[idx].dom)S.rules[idx].dom=24;
  if(k==='freq'&&(v==='weekly'||v==='biweekly')){if(S.rules[idx].dow==null)S.rules[idx].dow=1;if(v==='biweekly'&&!S.rules[idx].anchor)S.rules[idx].anchor=iso(todayMid());}
  save();render();if(k==='freq'||k==='type')renderRules();
}
function closeOv(id){document.getElementById(id).classList.remove('show');}
[].forEach.call(document.querySelectorAll('.ov'),function(o){o.addEventListener('click',function(e){if(e.target===o)o.classList.remove('show');});});

render();
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
</body>
</html>
